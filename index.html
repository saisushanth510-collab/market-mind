<!DOCTYPE html>
<html>
<head>

<title>MarketAI Suite</title>
<link rel="stylesheet" href="/static/style.css">

</head>

<body>

<h1>🚀 MarketAI Suite</h1>

<h2>Campaign Generator</h2>

<input id="product" placeholder="Product">
<input id="audience" placeholder="Audience">
<input id="platform" placeholder="Platform">

<button onclick="generateCampaign()">Generate Campaign</button>

<pre id="campaignOutput"></pre>

<hr>

<h2>Sales Pitch Generator</h2>

<input id="product2" placeholder="Product">
<input id="customer" placeholder="Customer Type">

<button onclick="generatePitch()">Generate Pitch</button>

<pre id="pitchOutput"></pre>

<hr>

<h2>Lead Scoring</h2>

<input id="name" placeholder="Lead Name">
<input id="budget" placeholder="Budget">
<input id="need" placeholder="Business Need">
<input id="urgency" placeholder="Urgency">

<button onclick="scoreLead()">Analyze Lead</button>

<pre id="leadOutput"></pre>


<script>

async function generateCampaign(){

const response = await fetch('/generate_campaign',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
product:document.getElementById('product').value,
audience:document.getElementById('audience').value,
platform:document.getElementById('platform').value
})
})

const data = await response.json()

document.getElementById("campaignOutput").innerText = data.campaign
}


async function generatePitch(){

const response = await fetch('/generate_pitch',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
product:document.getElementById('product2').value,
customer:document.getElementById('customer').value
})
})

const data = await response.json()

document.getElementById("pitchOutput").innerText = data.pitch
}


async function scoreLead(){

const response = await fetch('/lead_score',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
name:document.getElementById('name').value,
budget:document.getElementById('budget').value,
need:document.getElementById('need').value,
urgency:document.getElementById('urgency').value
})
})

const data = await response.json()

document.getElementById("leadOutput").innerText = data.score
}

</script>
<script src="/static/script.js"></script>
</body>
</html>
